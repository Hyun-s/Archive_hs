{{ define "main" }}
<div class="content-wrapper">
    <article class="post">
        <header class="post-header">
            <h1 class="post-title">{{ .Title }}</h1>
            {{ if .Date }}
            <time class="post-date">{{ .Date.Format "January 2, 2006" }}</time>
            {{ end }}
        </header>

        <div class="post-content">
            {{ .Content }}
        </div>
    </article>
</div>
{{ end }}
